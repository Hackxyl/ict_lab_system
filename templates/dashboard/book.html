{% extends 'dashboard/base_dashboard.html' %}
{% load static %}

{% block content %}

<div class="page-header">

    <div class="page-badge student">
        <i class="fas fa-calendar-plus"></i>
        New Booking
    </div>
</div>

{% if messages %}
<div class="messages">
    {% for message in messages %}
        <div class="alert {{ message.tags }}">
            {{ message }}
        </div>
    {% endfor %}
</div>
{% endif %}

<div class="dashboard-card booking-card">

    <div class="card-header">
        
        <h3>Complete all required fields below</h3>
    </div>
<br>
    <form method="POST" class="dashboard-form">
        {% csrf_token %}

        <div class="form-grid">

            

                <select name="computer" required>
                    <option value="">Choose Computer</option>

                    {% for computer in computers %}
                    <option value="{{ computer.id }}">
                        {{ computer.name }} ({{ computer.serial_number }})
                    </option>
                    {% empty %}
                    <option disabled>
                        No available computers
                    </option>
                    {% endfor %}
                </select>
            </div>
<br>
            <div class="form-group">
                <label>Date</label>
                <input type="date"
                       name="date"
                       required>
            </div>
<br>
            <div class="form-group">
                <label>Start Time</label>
                <input type="time"
                       name="start_time"
                       required>
            </div>
<br>
            <div class="form-group">
                <label>End Time</label>
                <input type="time"
                       name="end_time"
                       required>
            </div>

        </div>
<br>
        <div class="form-group">
            <label>Purpose</label>

            <textarea name="purpose"
                      rows="5"
                      placeholder="Why do you need the computer?"></textarea>
        </div>
<br>
        <div class="form-actions">

            <button type="submit"
                    class="btn btn-primary">
                <i class="fas fa-save"></i>
                Book Computer
            </button>

            <a href="{% url 'dashboard' %}"
               class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i>
                Dashboard
            </a>

        </div>

    </form>

</div>

{% endblock %}
