{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Kiangini ICT Lab</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>

<body>

<div class="auth-container">

    <div class="auth-card">

        <!-- HEADER -->
        <div class="auth-header">
            <h2>Create Account</h2>
            <p>Access computer lab resources and services</p>
        </div>

        <!-- MESSAGES -->
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <!-- FORM -->
        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" class="form-control" placeholder="John" required>
            </div>

            <div class="form-group">
                <label>First Name</label>
                <input type="text" name="first_name" class="form-control" placeholder="Enter first name" required>
            </div>

            <div class="form-group">
                <label>Last Name</label>
                <input type="text" name="last_name" class="form-control" placeholder="Enter last name" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" class="form-control" placeholder="example@gmail.com" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password1" class="form-control" placeholder="Enter password" required>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" name="password2" class="form-control" placeholder="Confirm password" required>
            </div>

            <button type="submit" class="btn-primary">
                Create Account
            </button>
        </form>

        <!-- FOOTER -->
        <div class="auth-footer">
            <p>
                Already have an account?
                <a href="{% url 'login' %}">Login</a>
            </p>

            <p>
                <a href="/">Back Home</a>
            </p>
        </div>

    </div>

</div>

</body>
</html>
