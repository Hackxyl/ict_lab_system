services:
  - type: web
    name: ict-lab-system
    runtime: python
    plan: free

    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate

    startCommand: gunicorn config.wsgi:application

    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: "config.settings"

      - key: SECRET_KEY
        generateValue: true

      - key: DEBUG
        value: "False"